# jarvis-os — PipeWire echo-cancel module.
#
# Crea una source virtual `jarvis-mic-aec` con cancelación de eco
# aplicada usando el algoritmo de WebRTC (mismo código que Chrome).
# Cualquier app que abra ese node recibe audio del mic con el audio
# del speaker ya restado, así jarvis-voice-daemon puede usar
# barge-in real sin auto-cortarse por su propio output.
#
# Se carga al instanciar PipeWire si está en
# `~/.config/pipewire/pipewire.conf.d/echo-cancel.conf` (instalado
# por arch/install.sh y arch/update.sh).

context.modules = [
    {   name = libpipewire-module-echo-cancel
        args = {
            library.name = aec/libspa-aec-webrtc
            aec.args = {
                webrtc.gain_control = true
                webrtc.extended_filter = true
                webrtc.noise_suppression = true
            }
            capture.props = {
                node.name = "capture.jarvis-aec"
                node.passive = true
            }
            source.props = {
                node.name = "jarvis-mic-aec"
                node.description = "jarvis-os Echo-Cancelled Microphone"
                media.class = "Audio/Source"
            }
            sink.props = {
                node.name = "sink.jarvis-aec"
                node.description = "jarvis-os AEC Sink (loopback to speaker)"
                node.passive = true
            }
            playback.props = {
                node.name = "playback.jarvis-aec"
                node.passive = true
            }
        }
    }
]
