# Bloque appended por arch/update.sh a ~/.config/hypr/custom/keybinds.conf.

# >>> jarvis-os: managed BEGIN
# F1.5 inline confirm: Super+Y aprueba, Super+N deniega.
bind = SUPER, Y, exec, echo "approve" > /tmp/jarvis-confirm-response
bind = SUPER, N, exec, echo "deny"    > /tmp/jarvis-confirm-response
# <<< jarvis-os: managed END
