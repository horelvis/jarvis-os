# Overrides jarvis-os encima de illogical-impulse.
# Este archivo se copia a ~/.config/hypr/custom/jarvis-os.conf donde
# illogical lo importa después de sus configs base.

# Patch del bug de gesture_distance obsoleto en general.conf upstream.
# Cuando illogical lo arregle, este override se elimina.
# (Esto re-define gestures con sintaxis moderna; el primer parse del
# upstream emitirá warning, pero al menos el valor final es válido.)
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
}

# Bindings jarvis-os F1.5 inline confirm:
# Super+Y aprueba, Super+N deniega acción pendiente.
bind = SUPER, Y, exec, echo "approve" > /tmp/jarvis-confirm-response
bind = SUPER, N, exec, echo "deny" > /tmp/jarvis-confirm-response

# Bordes activos en cyan jarvis-os.
general {
    col.active_border = rgba(5DCBFFee) rgba(3AA8E8ee) 45deg
}
