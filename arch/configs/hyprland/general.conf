# Bloque appended por arch/update.sh a ~/.config/hypr/custom/general.conf.
# El contenido entre los markers es regenerado en cada update — no editar
# en el destino, editar en el repo y correr ./arch/update.sh.

# >>> jarvis-os: managed BEGIN
input {
    kb_layout = es
    kb_variant =
    kb_options =
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
}

general {
    col.active_border = rgba(5DCBFFee) rgba(3AA8E8ee) 45deg
}
# <<< jarvis-os: managed END
